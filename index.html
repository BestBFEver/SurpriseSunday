<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunday Surprise ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      
      overflow-y: auto;
      background: linear-gradient(135deg, #3b0a14, #7a1028, #1f0b12);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      color: rgba(255,255,255,0.2);
      animation: float 12s linear infinite;
      font-size: 20px;
    }
    

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(1.5);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      width: 92%;
      max-width: 420px;
      margin: 20px auto;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 30px;
      padding: 30px 25px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.7);
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.85;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .countdown {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .question {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s ease;
      background: rgba(255,255,255,0.12);
      color: white;
      backdrop-filter: blur(10px);
    }

    button:hover {
      transform: scale(1.03);
      background: rgba(255,255,255,0.2);
    }

    .reveal {
      margin-top: 25px;
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,255,255,0.1));
      animation: revealAnim 1s ease;
      display: none;
    }

    @keyframes revealAnim {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .reveal-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .reveal-text {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.4;
    }

    .dramatic {
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }

    .final-message {
      line-height: 1.8;
      margin-top: 20px;
      font-size: 17px;
    }

    .restart-btn {
      margin-top: 25px;
      background: white;
      color: #24243e;
      font-weight: 600;
    }

  </style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="container" id="container">

  <img class="photo" src="WhatsApp Image 2026-05-28 at 13.44.59.jpeg" alt="romantic">

  <h1>For My Princess ❤️</h1>

  <div class="subtitle">
    Your Husband has planned something special for Sunday...<br>
    But you need to answer the questions first.
  </div>

  <div class="countdown" id="countdown"></div>

  <div class="question" id="question"></div>

  <div class="answers" id="answers"></div>

  <div class="reveal" id="reveal">
    <div class="reveal-title">Unlocked</div>
    <div class="reveal-text" id="revealText"></div>
  </div>

</div>

<script>

const questions = [
  {
    question: 'Do you want to go on a surprise date on Sunday?',
    answers: ['Yes ❤️', 'No 😭'],
    correct: 0,
    reveal: 'Good choice Princess ❤️'
  },
  {
    question: 'When was Your Husband born?',
    type: 'date',
    correctDate: '2004-07-10',
    reveal: '📅 Sunday 31 May • 12:00 PM'
  },
  {
    question: 'Where did we meet?',
    answers: ['The Lu Office', 'Deans', 'Solar'],
    correct: 0,
    reveal: '🏡 Your pickup location is your house...'
  },
  {
    question: 'What is my favourite sport?',
    answers: ['Rugby', 'Soccer', 'Hockey'],
    correct: 2,
    reveal: '⛳ Expect a competitive little activity 😌'
  },
  {
    question: 'What is my favourite food?',
    answers: ['Pizza', 'Lasagna', 'Burger'],
    correct: 1,
    reveal: '🍝 Dinner is somewhere fancy and delicious...'
  },
  {
    question: 'What is my favourite outfit on you?',
    answers: ['Jumpsuit', 'Zara Dress', 'Casual Clothes'],
    correct: 'all',
    reveal: '✨ I think you look beautiful in everything. But wear something cute for the activity, nice for dinner, and bring something warm ❤️'
  }
];

let currentQuestion = 0;

const questionEl = document.getElementById('question');
const answersEl = document.getElementById('answers');
const revealEl = document.getElementById('reveal');
const revealTextEl = document.getElementById('revealText');
const container = document.getElementById('container');

function loadQuestion() {
  revealEl.style.display = 'none';

  const q = questions[currentQuestion];

  questionEl.innerHTML = q.question;
  answersEl.innerHTML = '';

  if (q.type === 'date') {
    const input = document.createElement('input');
    input.type = 'date';
    input.style.padding = '16px';
    input.style.borderRadius = '18px';
    input.style.border = 'none';
    input.style.fontSize = '16px';
    input.style.marginBottom = '15px';
    input.style.width = '100%';
    input.style.background = 'rgba(255,255,255,0.12)';
    input.style.color = 'white';

    const submitBtn = document.createElement('button');
    submitBtn.innerText = 'Submit ❤️';

    submitBtn.onclick = () => {
      if (input.value === q.correctDate) {
        reveal(q.reveal);
      } else {
        dramaticFail();
      }
    };

    answersEl.appendChild(input);
    answersEl.appendChild(submitBtn);
  } else {
    q.answers.forEach((answer, index) => {
      const btn = document.createElement('button');
      btn.innerText = answer;

      btn.onclick = () => checkAnswer(index);

      answersEl.appendChild(btn);
    });
  }
}

function checkAnswer(selected) {
  const q = questions[currentQuestion];

  if (q.correct === 'all') {
    reveal(q.reveal);
    return;
  }

  if (selected === q.correct) {
    reveal(q.reveal);
  } else {
    dramaticFail();
  }
}

function reveal(text) {
  revealEl.style.display = 'block';
  revealTextEl.innerHTML = text;

  setTimeout(() => {
    currentQuestion++;

    if (currentQuestion < questions.length) {
      loadQuestion();
    } else {
      finalScreen();
    }
  }, 3200);
}

function dramaticFail() {
  container.classList.add('dramatic');

  container.innerHTML = `
    <h1 style="font-size:42px; margin-bottom:20px;">😔</h1>
    <h1 style="margin-bottom:20px;">Wow...</h1>

    <div style="font-size:18px; line-height:1.8; opacity:0.9;">
      Your Husband is now dramatically sitting in the corner questioning everything.<br><br>
      Clearly you need another chance Princess.
    </div>

    <button class="restart-btn" onclick="restartQuiz()">
      Fine... let me try again 😭
    </button>
  `;
}

function restartQuiz() {
  location.reload();
}

function finalScreen() {
  container.innerHTML = `

    <img class="photo" src="WhatsApp Image 2026-05-28 at 13.44.59.jpeg">

    <h1>See You Sunday ❤️</h1>

    <div class="final-message">
      ✨ Date: Sunday, 31 May<br>
      🕛 Time: 12:00 PM<br>
      📍 Pretoria East<br><br>

      Expect something competitive, romantic, fun, and delicious 😌<br><br>

      Your Husband cannot wait to spend the day with his Princess ❤️<br><br>👗 Outfit Hint: Wear something cute for the activity, classy enough for dinner, and bring something warm ❤️
    </div>

  `;
}

loadQuestion();

function createHearts() {
  const hearts = document.getElementById('hearts');

  setInterval(() => {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '❤️';

    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = Math.random() * 20 + 15 + 'px';
    heart.style.animationDuration = Math.random() * 5 + 8 + 's';

    hearts.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 12000);

  }, 500);
}

createHearts();

function updateCountdown() {
  const countdownEl = document.getElementById('countdown');

  const targetDate = new Date('2026-05-31T12:00:00');
  const now = new Date();

  const diff = targetDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);

  countdownEl.innerHTML = `⏳ Countdown to our date: ${days}d ${hours}h ${minutes}m`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

</script>

</body>
</html>
